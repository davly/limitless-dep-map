name: ci

# Smoke CI for limitless-dep-map. The package is R145 stdlib-only, so the
# test job needs no third-party install step — it runs the suite with the
# stdlib unittest runner. A second job proves the pipx-installable
# contract (uplift #26): build the wheel and run the generated console
# script from an isolated install.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite (stdlib unittest, no deps)
        run: python -m unittest discover -s tests -t . -v

  install-smoke:
    name: pipx-installable smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install wheel into an isolated venv and run the console script
        run: |
          python -m venv /tmp/depmap-venv
          /tmp/depmap-venv/bin/python -m pip install dist/*.whl
          /tmp/depmap-venv/bin/dep-map --help
          /tmp/depmap-venv/bin/dep-map query --help
