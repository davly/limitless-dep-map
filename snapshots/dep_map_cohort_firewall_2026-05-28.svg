amily="Helvetica, Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">whether a flagship is fit for any regulated purpose, nor whether the absence of an edge means the flagship is non-compliant. Operators MUST</text><text x="800" y="1570" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">treat each missing or unexpected edge as a prompt to investigate, not as a finding of fault.</text><text x="800" y="1594" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#888888" text-anchor="middle">audit_rule=R166_LIABILITY_FOOTER_CONST</text></g></svg>
